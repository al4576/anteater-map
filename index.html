<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find An Anteater</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.8em%22 font-size=%2280%22>A</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #0a0a0a;
            --panel-bg: #141414;
            --panel-elevated: #1e1e1e;
            --border-subtle: #2f2f2f;
            --accent: #ffffff;
            --accent-soft: #d9d9d9;
            --text-primary: #f2f2f2;
            --text-muted: #a8a8a8;
            --ant-red: #bdbdbd;
            --ant-black: #0f0f0f;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            position: relative;
            height: 100vh;
        }

        /* Floating search controls */
        #header {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: min(700px, calc(100% - 24px));
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            display: none;
            font-size: 1.4rem;
            letter-spacing: 0.02em;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 12px;
            text-align: center;
        }

        .search-container {
            max-width: 700px;
            margin: 0;
            display: flex;
            gap: 10px;
            padding: 0;
        }

        #search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background-color: var(--panel-bg);
            color: var(--text-primary);
        }

        #search-button {
            padding: 10px 18px;
            background-color: var(--panel-elevated);
            color: white;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        #search-button:hover {
            background-color: #282828;
        }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 0;
        }

        .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--border-subtle);
            background-color: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background-color: var(--panel-elevated);
            color: var(--accent);
            border-color: transparent;
        }

        .filter-btn[data-filter="encounters"] {
            color: #cc2200;
            border-color: #cc2200;
        }

        .filter-btn[data-filter="encounters"].active {
            background-color: #cc2200;
            color: #ffffff;
            border-color: #cc2200;
        }

        .error-message {
            text-align: center;
            color: var(--ant-red);
            margin-top: 0;
            font-size: 0.85rem;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.55);
        }

        /* Main Content */
        #main-content {
            position: relative;
            overflow: hidden;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Results Sidebar */
        #results-panel {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 320px;
            max-height: calc(100% - 40px);
            background-color: rgba(16, 16, 16, 0.92);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
            transform: translateX(-400px);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        #results-panel::-webkit-scrollbar {
            width: 8px;
        }

        #results-panel::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 2px 8px 0;
            border-radius: 10px;
        }

        #results-panel::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }

        #results-panel.visible {
            transform: translateX(0);
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .results-title {
            color: var(--accent);
            font-weight: 500;
            font-size: 1.2rem;
        }

        .result-item {
            padding: 15px;
            margin-bottom: 10px;
            background-color: rgba(22, 22, 22, 0.96);
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid #3a3a3a;
            transition: all 0.2s;
        }

        .result-item:hover {
            border-color: #f2f2f2;
            background-color: #1a1a1a;
        }

        .result-name {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .result-distance {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .result-location {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .encounter-badge {
            display: inline-block;
            padding: 0;
            font-size: 0.75rem;
            margin-top: 5px;
            font-weight: bold;
        }

        .encounter-badge.available {
            background-color: transparent;
            color: #ff5a5a;
        }

        /* Info Panel */
        #info-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 400px;
            height: 100%;
            background-color: transparent;
            border-left: none;
            padding: 30px;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 200;
        }

        #info-panel.visible {
            transform: translateX(0);
        }

        #info-content {
            background-color: rgba(22, 22, 22, 0.96);
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 22px;
        }

        #info-content.encounter-card {
            background-color: #7e1500;
        }

        #info-panel .close-btn {
            top: 38px;
            right: 38px;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background-color: #232323;
            color: white;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }

        .info-title {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-label {
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .info-value {
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .species-list {
            list-style: none;
            padding-left: 0;
        }


        .directions-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: var(--panel-elevated);
            color: white;
            text-decoration: none;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-weight: 600;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        .directions-btn:hover {
            background-color: #282828;
        }

        /* Pulse Animation for Selected Marker */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            #header {
                width: calc(100% - 16px);
                top: 8px;
            }

            .search-container {
                flex-direction: column;
            }

            #results-panel {
                left: 10px;
                right: 10px;
                width: auto;
                max-height: 50%;
                top: auto;
                bottom: 10px;
                transform: translateY(calc(100% + 20px));
            }

            #results-panel.visible {
                transform: translateY(0);
            }

            #info-panel {
                width: 100%;
                height: 60%;
                top: auto;
                bottom: 0;
                border-left: none;
                border-top: 1px solid var(--border-subtle);
                transform: translateY(100%);
            }

            #info-panel.visible {
                transform: translateY(0);
            }

        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111111;
        }

        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <h1>Find An Anteater</h1>
            <div class="search-container">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Enter your city or zip code..."
                    autocomplete="off"
                >
                <button id="search-button">Search</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Locations</button>
                <button class="filter-btn" data-filter="encounters">Encounters Only</button>
            </div>
            <div id="error-message" class="error-message"></div>
        </header>

        <div id="main-content">
            <div id="map"></div>

            <!-- Results Sidebar -->
            <div id="results-panel">
                <div class="results-header">
                    <h3 class="results-title">Nearby Locations</h3>
                    <button class="close-btn" id="close-results">×</button>
                </div>
                <div id="results-list"></div>
            </div>

            <!-- Info Panel -->
            <div id="info-panel">
                <button class="close-btn" id="close-info">×</button>
                <div id="info-content"></div>
            </div>
        </div>

    </div>

    <!-- Load location data from external file -->
    <script src="locations.js"></script>

    <script>

        // ===== STATE =====
        let map;
        let markers = [];
        let selectedMarker = null;
        let userLocation = null;
        let currentFilter = 'all';
        let geocoder;

        // ===== INITIALIZATION =====
        function initMap() {
            // Create geocoder
            geocoder = new google.maps.Geocoder();

            // Map styling - warm naturalist field-map aesthetic
            const mapStyles = [
                { "elementType": "geometry", "stylers": [{ "color": "#f5ebe0" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#4a3728" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#a8c5b5" }] },
                { "featureType": "landscape.natural", "elementType": "geometry", "stylers": [{ "color": "#dde5c8" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#c9b99a" }] },
                { "featureType": "poi.park", "elementType": "geometry", "stylers": [{ "color": "#c5d9a0" }] },
                { "featureType": "administrative", "elementType": "geometry.stroke", "stylers": [{ "color": "#8b7355" }, { "weight": 1 }] }
            ];

            // Initialize map centered on Americas
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 5, lng: -80 },
                zoom: 3,
                minZoom: 3,
                maxZoom: 16,
                styles: mapStyles,
                mapTypeControl: false,
                streetViewControl: false
            });

            // Create markers for all locations
            createMarkers();

            // Event listeners
            document.getElementById('search-button').addEventListener('click', handleSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
            document.getElementById('close-info').addEventListener('click', closeInfoPanel);
            document.getElementById('close-results').addEventListener('click', closeResultsPanel);

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    filterMarkers();
                });
            });
        }

        // ===== ANT MARKER SVGs =====
        function createAntIcon(isRed) {
            const color = isRed ? '#cc2200' : '#1a1a1a';
            return {
                path: 'M 16 8 C 16 10 14.5 11.5 12.5 11.5 C 10.5 11.5 9 10 9 8 C 9 6 10.5 4.5 12.5 4.5 C 14.5 4.5 16 6 16 8 Z M 9 12 C 9 14.5 7 16.5 4.5 16.5 C 2 16.5 0 14.5 0 12 C 0 9.5 2 7.5 4.5 7.5 C 7 7.5 9 9.5 9 12 Z M 25 12 C 25 14.5 23 16.5 20.5 16.5 C 18 16.5 16 14.5 16 12 C 16 9.5 18 7.5 20.5 7.5 C 23 7.5 25 9.5 25 12 Z M 4.5 20 L 2 24 M 4.5 20 L 7 24 M 20.5 20 L 18 24 M 20.5 20 L 23 24 M 9 17 L 7 21 M 16 17 L 18 21 M 12.5 2 L 12.5 0 M 15 3 L 17 1',
                fillColor: color,
                fillOpacity: 1,
                strokeColor: color,
                strokeWeight: 1.5,
                scale: 1,
                anchor: new google.maps.Point(12.5, 12)
            };
        }

        // ===== CREATE MARKERS =====
        function createMarkers() {
            LOCATIONS.forEach(location => {
                const marker = new google.maps.Marker({
                    position: { lat: location.lat, lng: location.lng },
                    map: map,
                    icon: createAntIcon(location.encounter),
                    title: location.name,
                    animation: google.maps.Animation.DROP
                });

                marker.locationData = location;

                marker.addListener('click', () => {
                    selectMarker(marker);
                });

                // Hover effect
                marker.addListener('mouseover', () => {
                    if (marker !== selectedMarker) {
                        marker.setIcon({
                            ...createAntIcon(location.encounter),
                            scale: 1.2
                        });
                    }
                });

                marker.addListener('mouseout', () => {
                    if (marker !== selectedMarker) {
                        marker.setIcon(createAntIcon(location.encounter));
                    }
                });

                markers.push(marker);
            });
        }

        // ===== SEARCH & GEOCODING =====
        function handleSearch() {
            const searchInput = document.getElementById('search-input').value.trim();
            const errorDiv = document.getElementById('error-message');

            if (!searchInput) {
                errorDiv.textContent = 'Please enter a city or zip code';
                return;
            }

            errorDiv.textContent = '';

            geocoder.geocode({ address: searchInput }, (results, status) => {
                if (status === 'OK' && results[0]) {
                    userLocation = results[0].geometry.location;
                    
                    // Pan and zoom to searched location
                    map.setCenter(userLocation);
                    map.setZoom(8);

                    // Calculate distances and show results
                    showNearbyResults();
                } else {
                    errorDiv.textContent = 'Location not found. Please try again with a valid city or zip code.';
                }
            });
        }

        // ===== CALCULATE DISTANCE =====
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 3959; // Earth radius in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // ===== SHOW NEARBY RESULTS =====
        function showNearbyResults() {
            if (!userLocation) return;

            // Calculate distances
            const locationsWithDistance = LOCATIONS.map(location => ({
                ...location,
                distance: calculateDistance(
                    userLocation.lat(),
                    userLocation.lng(),
                    location.lat,
                    location.lng
                )
            }));

            // Sort by distance and take top 5
            const nearest = locationsWithDistance
                .filter(loc => currentFilter === 'all' || loc.encounter)
                .sort((a, b) => a.distance - b.distance)
                .slice(0, 5);

            // Display results
            const resultsPanel = document.getElementById('results-panel');
            const resultsList = document.getElementById('results-list');
            
            resultsList.innerHTML = '';
            
            nearest.forEach(location => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <div class="result-name">${location.name}</div>
                    <div class="result-distance">${location.distance.toFixed(1)} miles away</div>
                    <div class="result-location">${location.city}, ${location.state}</div>
                    ${location.encounter ? '<span class="encounter-badge available">Encounter Available</span>' : ''}
                `;
                
                div.addEventListener('click', () => {
                    const marker = markers.find(m => m.locationData.id === location.id);
                    if (marker) selectMarker(marker);
                });
                
                resultsList.appendChild(div);
            });

            resultsPanel.classList.add('visible');
        }

        // ===== SELECT MARKER =====
        function selectMarker(marker) {
            // Reset previous selection
            if (selectedMarker) {
                selectedMarker.setIcon(createAntIcon(selectedMarker.locationData.encounter));
            }

            // Set new selection
            selectedMarker = marker;
            marker.setIcon({
                ...createAntIcon(marker.locationData.encounter),
                scale: 1.3
            });

            // Show info panel
            showInfoPanel(marker.locationData);

            // Pan to marker
            map.panTo(marker.getPosition());
        }

        // ===== INFO PANEL =====
        function showInfoPanel(location) {
            const infoPanel = document.getElementById('info-panel');
            const infoContent = document.getElementById('info-content');

            infoContent.classList.toggle('encounter-card', Boolean(location.encounter));

            infoContent.innerHTML = `
                <h2 class="info-title">${location.name}</h2>
                
                <div class="info-section">
                    <div class="info-label">Location</div>
                    <div class="info-value">${location.city}, ${location.state}, ${location.country}</div>
                </div>

                <div class="info-section">
                    <div class="info-label">Species</div>
                    <ul class="species-list">
                        ${location.species.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>

                ${location.notes ? `
                    <div class="info-section">
                        <div class="info-label">Notes</div>
                        <div class="info-value">${location.notes}</div>
                    </div>
                ` : ''}

                ${location.encounter_details ? `
                    <div class="info-section">
                        <div class="info-label">Encounter Details</div>
                        <div class="info-value">${location.encounter_details}</div>
                    </div>
                ` : ''}

                <div class="info-section">
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${location.lat},${location.lng}" 
                       target="_blank" 
                       class="directions-btn">
                        Get Directions
                    </a>
                    ${location.website ? `<br><a href="${location.website}" target="_blank" class="directions-btn" style="margin-top: 10px;">Visit Website</a>` : ''}
                </div>
            `;

            infoPanel.classList.add('visible');
        }

        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('visible');
            
            if (selectedMarker) {
                selectedMarker.setIcon(createAntIcon(selectedMarker.locationData.encounter));
                selectedMarker = null;
            }
        }

        function closeResultsPanel() {
            document.getElementById('results-panel').classList.remove('visible');
        }

        // ===== FILTER MARKERS =====
        function filterMarkers() {
            markers.forEach(marker => {
                if (currentFilter === 'all' || marker.locationData.encounter) {
                    marker.setMap(map);
                } else {
                    marker.setMap(null);
                }
            });

            // Update results if search was performed
            if (userLocation) {
                showNearbyResults();
            }
        }

        // ===== LOAD GOOGLE MAPS API =====
        window.initMap = initMap;
    </script>

    <!-- 
    GOOGLE MAPS API KEY SETUP:
    
    1. Replace YOUR_API_KEY_HERE with your actual Google Maps API key
    2. IMPORTANT: Restrict your API key in Google Cloud Console:
       - HTTP referrer restrictions: Add your-username.github.io/* and localhost
       - API restrictions: Enable ONLY Maps JavaScript API and Geocoding API
    3. This is safe - API keys are meant to be visible in client-side code when properly restricted
    
    Required APIs: Maps JavaScript API, Geocoding API, (optional) Places API
    -->
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDW_1sh2o8lZzAMaESUpKP5sqaz-7fV0go&callback=initMap">
    </script>
</body>
</html>
